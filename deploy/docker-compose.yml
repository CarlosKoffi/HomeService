services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/HomeService.Api/HomeService.Api.csproj
        APP_DLL: HomeService.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  company:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/HomeService.Company/HomeService.Company.csproj
        APP_DLL: HomeService.Company.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ApiBaseUrl: ${API_BASE_URL:-http://api:8080}
    ports:
      - "${COMPANY_PORT:-8081}:8080"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PROJECT: src/HomeService.Admin/HomeService.Admin.csproj
        APP_DLL: HomeService.Admin.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ApiBaseUrl: ${API_BASE_URL:-http://api:8080}
    ports:
      - "${ADMIN_PORT:-8082}:8080"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
